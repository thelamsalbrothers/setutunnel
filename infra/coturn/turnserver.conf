# SetuTunnel self-hosted TURN (coturn) — a starting template.
# The vendor-neutral way to get NAT relay fallback: run your own, independent of
# any managed provider. TURN only ever relays CIPHERTEXT (§4.1/§5) — it cannot
# read the transfer even though it forwards the bytes.
#
# EDIT THESE before use, then: `docker compose --profile turn up -d`
#   - realm            → your domain
#   - external-ip      → this server's PUBLIC IP (required behind NAT/cloud)
#   - static-auth-secret → a long random string; KEEP IT OFF the client
#
# Open on your firewall: UDP/TCP 3478 (listener) and UDP 49160-49200 (relay).

realm=turn.example.org
external-ip=REPLACE_WITH_PUBLIC_IP

listening-port=3478
min-port=49160
max-port=49200

# Ephemeral (time-limited) credentials via the TURN REST API. The signaling
# server mints a short-lived username/credential from this same secret, so no
# long-lived secret is ever shipped in the static frontend (§5). This is the
# recommended mode.
use-auth-secret
static-auth-secret=REPLACE_WITH_LONG_RANDOM_SECRET

# Sensible hardening: don't relay to private ranges or loopback.
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
no-loopback-peers

fingerprint
stale-nonce=600

# For TLS (turns:) add your cert/key and uncomment:
# tls-listening-port=5349
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/privkey.pem
